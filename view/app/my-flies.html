<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg-gray-300 min-h-screen">
      <aside
        id="sidebar"
        class="bg-linear-to-r from-cyan-500 to-blue-500 h-full fixed top-0 left-0 overflow-hidden"
        style="width: 240px; transition: 0.3s"
      >
        <div class="flex flex-col items-center py-6 overflow-hidden">
          <img
            src="../images/WhatsApp Image 2026-02-02 at 3.16.45 PM.jpeg"
            alt="avatr image"
            class="rounded-full w-25 h-25 border-2 border-white"
          />
          <h1 class="text-lg font-medium text-white">Shelesh mathur</h1>
          <p class="text-sm text-gray-100">sheleshsingh755@gmail.com</p>
        </div>
        <div class="px-6 flex flex-col gap-4">
          <a href="./dashboard.html">
            <button
              class="bg-rose-400 text-white py-2 w-full rounded hover:bg-rose-600"
            >
              <i class="ri-dashboard-line"></i>
              <label>Dashboard</label>
            </button>
          </a>
          <a href="./my-flies.html">
            <button
              class="bg-rose-400 text-white py-2 w-full rounded hover:bg-rose-600"
            >
              <i class="ri-file-line"></i>
              <label>My Files</label>
            </button>
          </a>
          <a href="./history.html">
            <button
              class="bg-rose-400 text-white py-2 w-full rounded hover:bg-rose-600"
            >
              <i class="ri-history-line"></i>
              <label>History</label>
            </button>
          </a>
          <button
            class="bg-rose-400 text-white py-2 w-full rounded hover:bg-rose-600"
          >
            <i class="ri-logout-circle-r-line"></i>
            <label>Logout</label>
          </button>
        </div>
      </aside>
      <section
        id="section"
        class=""
        style="margin-left: 240px; transition: 0.3s"
      >
        <nav
          class="bg-white px-6 py-4 w-full shadow-lg flex justify-between items-center"
        >
          <div class="flex items-center gap-2">
            <i class="ri-contrast-2-fill text-4xl text-violet-600"></i>
            <h1 class="text-2xl font-medium">Filemoon</h1>
          </div>
          <div class="space-x-2">
            <button class="bg-gray-100 px-3 py-2 rounded hover:bg-gray-200">
              <i class="ri-logout-circle-r-line"></i>
            </button>
            <button
              class="bg-gray-100 px-3 py-2 rounded hover:bg-gray-200"
              onclick="toggleSidebar()"
            >
              <i class="ri-menu-2-line"></i>
            </button>
          </div>
        </nav>
        <div class="p-6 space-y-4">
          <div class="flex justify-between items-center">
            <h1 class="text-lg font-medium">My Files</h1>
            <button
              onclick="toggleDrawer()"
              class="bg-violet-500 text-white px-6 py-2 hover:bg-violet-600 rounded"
            >
              <i class="ri-add-line"></i>
              <label>Add File</label>
            </button>
          </div>
          <table class="w-full bg-white">
            <tr class="bg-slate-900 text-white text-left">
              <th class="font-medium py-4 pl-6">Filename</th>
              <th class="font-medium">Type</th>
              <th class="font-medium">Size</th>
              <th class="font-medium">Created</th>
              <th class="font-medium">Actions</th>
            </tr>
            <tr class="text-gray-500 border-b border-gray-200">
              <td class="pl-6 py-4">Introduction to html</td>
              <td>Image</td>
              <td>20.03mb</td>
              <td>24-4-2026</td>
              <td>
                <div class="space-x-3">
                  <button
                    class="bg-rose-400 px-2 py-1 text-white rounded hover:bg-rose-600"
                  >
                    <i class="ri-delete-bin-4-line"></i>
                  </button>

                  <button
                    class="bg-green-400 px-2 py-1 text-white rounded hover:bg-green-500"
                  >
                    <i class="ri-download-line"></i>
                  </button>

                  <button
                    class="bg-amber-400 px-2 py-1 text-white rounded hover:bg-amber-600"
                  >
                    <i class="ri-share-line"></i>
                  </button>
                </div>
              </td>
            </tr>
            <tr class="text-gray-500 border-b border-gray-200">
              <td class="pl-6 py-4">Introduction to html</td>
              <td>Image</td>
              <td>20.03mb</td>
              <td>24-4-2026</td>
              <td>
                <div class="space-x-3">
                  <button
                    class="bg-rose-400 px-2 py-1 text-white rounded hover:bg-rose-600"
                  >
                    <i class="ri-delete-bin-4-line"></i>
                  </button>

                  <button
                    class="bg-green-400 px-2 py-1 text-white rounded hover:bg-green-500"
                  >
                    <i class="ri-download-line"></i>
                  </button>

                  <button
                    class="bg-amber-400 px-2 py-1 text-white rounded hover:bg-amber-600"
                  >
                    <i class="ri-share-line"></i>
                  </button>
                </div>
              </td>
            </tr>
            <tr class="text-gray-500 border-b border-gray-200">
              <td class="pl-6 py-4">Introduction to html</td>
              <td>Image</td>
              <td>20.03mb</td>
              <td>24-4-2026</td>
              <td>
                <div class="space-x-3">
                  <button
                    class="bg-rose-400 px-2 py-1 text-white rounded hover:bg-rose-600"
                  >
                    <i class="ri-delete-bin-4-line"></i>
                  </button>

                  <button
                    class="bg-green-400 px-2 py-1 text-white rounded hover:bg-green-500"
                  >
                    <i class="ri-download-line"></i>
                  </button>

                  <button
                    class="bg-amber-400 px-2 py-1 text-white rounded hover:bg-amber-600"
                  >
                    <i class="ri-share-line"></i>
                  </button>
                </div>
              </td>
            </tr>
          </table>
        </div>
      </section>
      <div
        id="drawer"
        class="fixed w-4/12 bg-white shadow-lg top-0 h-full p-6 space-y-6"
        style="right: -33.33%; transition: 0.3s"
      >
        <div class="flex justify-between items-center">
          <h1 class="text-lg text-gray-600 font-medium">Adding a new file</h1>
          <button onclick="toggleDrawer()">
            <i class="ri-close-circle-fill hover:text-rose-600 text-lg"></i>
          </button>
        </div>
        <div class="h-px bg-gray-200 -mx-6"></div>
        <form class="space-y-6">
          <div class="flex flex-col gap-2">
            <label class="text-gray-600 font-medium">Filename</label>
            <input
              required
              class="border border-gray-300 py-2 px-3 rounded"
              type="text"
            />
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-gray-600 font-medium">Choose a file</label>
            <input
              required
              class="border border-gray-300 py-2 px-3 rounded"
              type="file"
            />
          </div>
          <button
            class="bg-rose-400 hover:bg-rose-600 text-white py-2 px-6 rounded"
          >
            Upload now
          </button>
        </form>
        <div class="bg-gray-200 h-4 rounded-lg overflow-hidden">
          <div
            class="h-full w-7/12 bg-green-500 text-xs text-gray-500 text-center"
          >
            70%
          </div>
        </div>
      </div>
    </div>
    <script src="../js/layout.js"></script>
    <script src="../js/my-files.js"></script>
  </body>
</html>
